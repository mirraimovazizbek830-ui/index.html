<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AnonimChat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05060a;--s1:#0d0f18;--s2:#13162a;
  --a1:#6c63ff;--a2:#ff6b9d;--a3:#00e5ff;
  --tx:#e8eaf0;--td:#6b7280;
  --br:rgba(108,99,255,0.15);--glow:rgba(108,99,255,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;overflow:hidden}
#cv{position:fixed;inset:0;z-index:0;pointer-events:none}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.04;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0/200px}

/* ---- JOIN ---- */
#js{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;transition:opacity .6s,transform .6s}
#js.hide{opacity:0;transform:scale(1.04) translateY(-18px);pointer-events:none}
.card{position:relative;background:var(--s1);border:1px solid var(--br);border-radius:24px;padding:48px 40px;
  width:min(440px,92vw);text-align:center;box-shadow:0 0 70px var(--glow),0 0 140px rgba(108,99,255,.07);
  animation:cIn .8s cubic-bezier(.16,1,.3,1) both}
@keyframes cIn{from{opacity:0;transform:translateY(36px) scale(.96)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:-1px;left:18%;right:18%;height:2px;
  background:linear-gradient(90deg,transparent,var(--a1),var(--a2),transparent);animation:sh 3s ease infinite}
@keyframes sh{0%,100%{opacity:.5}50%{opacity:1}}
.logo{font-size:44px;display:block;animation:fl 3s ease-in-out infinite;margin-bottom:6px}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.jtitle{font-size:1.9rem;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.jsub{font-size:.82rem;color:var(--td);font-family:'Space Mono',monospace;margin-bottom:32px;letter-spacing:.05em}
.iw{margin-bottom:10px}
.iw input{width:100%;background:var(--bg);border:1.5px solid var(--br);border-radius:13px;padding:15px 18px;
  font-size:1rem;font-family:'Space Mono',monospace;color:var(--tx);outline:none;
  transition:border-color .3s,box-shadow .3s;letter-spacing:.06em}
.iw input:focus{border-color:var(--a1);box-shadow:0 0 0 3px var(--glow)}
.iw input::placeholder{color:var(--td)}
.hint{font-size:.72rem;color:var(--td);font-family:'Space Mono',monospace;margin-bottom:22px;text-align:left;padding-left:2px}
.jbtn{width:100%;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:13px;
  padding:15px;font-size:1rem;font-weight:700;color:#fff;cursor:pointer;font-family:'Syne',sans-serif;
  transition:transform .2s,box-shadow .2s;letter-spacing:.04em}
.jbtn:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--glow)}
.jbtn:active{transform:translateY(0)}
.jerr{margin-top:12px;font-size:.78rem;font-family:'Space Mono',monospace;color:var(--a2);min-height:16px}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

/* ---- CHAT ---- */
#cs{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .5s}
#cs.show{opacity:1;pointer-events:all}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:62px;
  border-bottom:1px solid var(--br);background:rgba(13,15,24,.92);backdrop-filter:blur(18px);flex-shrink:0}
.hl{display:flex;align-items:center;gap:9px}
.htitle{font-size:1.05rem;font-weight:800;background:linear-gradient(90deg,var(--a1),var(--a2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.opill{display:flex;align-items:center;gap:5px;background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.18);
  border-radius:999px;padding:4px 11px;font-size:.72rem;font-family:'Space Mono',monospace;color:var(--a3)}
.odot{width:6px;height:6px;border-radius:50%;background:var(--a3);animation:pu 2s ease infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}
.nbadge{font-size:.75rem;font-family:'Space Mono',monospace;color:var(--a1);
  background:rgba(108,99,255,.08);border:1px solid var(--br);border-radius:999px;padding:3px 11px}

#msgs{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:7px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}

.smsg{text-align:center;font-size:.68rem;font-family:'Space Mono',monospace;color:var(--td);padding:2px 0;animation:fadeU .35s ease both}
.smsg span{background:var(--s2);border:1px solid var(--br);border-radius:999px;padding:3px 11px;display:inline-block}
@keyframes fadeU{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

.mw{display:flex;flex-direction:column;max-width:76%;width:fit-content;animation:fadeU .3s ease both}
.mw.self{align-self:flex-end;align-items:flex-end}
.mw.other{align-self:flex-start;align-items:flex-start}
.mm{font-size:.66rem;font-family:'Space Mono',monospace;color:var(--td);margin-bottom:3px;display:flex;gap:5px}
.mm .un{color:var(--a2)}
.mw.self .mm .un{color:var(--a1)}
.mb{padding:10px 14px;border-radius:15px;font-size:.92rem;line-height:1.5;word-break:break-word}
.mw.other .mb{background:#0f1220;border:1px solid var(--br);border-bottom-left-radius:4px}
.mw.self .mb{background:#1a1535;border:1px solid rgba(108,99,255,.22);border-bottom-right-radius:4px;box-shadow:0 0 14px rgba(108,99,255,.07)}

.ia{padding:11px 14px 15px;border-top:1px solid var(--br);background:rgba(13,15,24,.96);backdrop-filter:blur(18px);flex-shrink:0}
.ir{display:flex;gap:9px;align-items:flex-end}
#mi{flex:1;background:var(--s2);border:1.5px solid var(--br);border-radius:13px;padding:11px 15px;
  font-size:.92rem;font-family:'Syne',sans-serif;color:var(--tx);outline:none;resize:none;
  max-height:96px;min-height:44px;transition:border-color .3s,box-shadow .3s;line-height:1.5}
#mi:focus{border-color:var(--a1);box-shadow:0 0 0 3px var(--glow)}
#mi::placeholder{color:var(--td)}
.sbtn{width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--a1),var(--a2));border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  transition:transform .2s,box-shadow .2s}
.sbtn:hover{transform:scale(1.09);box-shadow:0 4px 18px var(--glow)}
.sbtn:active{transform:scale(.94)}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;text-align:center}
.empty .ei{font-size:2.4rem;animation:fl 3s ease-in-out infinite}
.empty p{font-size:.75rem;font-family:'Space Mono',monospace;color:var(--td);max-width:190px;line-height:1.6}

@media(max-width:480px){.card{padding:32px 18px}.jtitle{font-size:1.55rem}.mw{max-width:86%}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="noise"></div>

<div id="js">
  <div class="card">
    <span class="logo">👤</span>
    <h1 class="jtitle">AnonimChat</h1>
    <p class="jsub">// kimligingizni hech kim bilmaydi</p>
    <div class="iw">
      <input id="ni" type="text" placeholder="taxallusingizni kiriting..." maxlength="20" autocomplete="off" spellcheck="false"/>
    </div>
    <p class="hint">⚡ Kamida 4 belgi &nbsp;·&nbsp; Faqat harf, raqam, _ va -</p>
    <button class="jbtn" onclick="join()">Kirishga tayyor →</button>
    <div class="jerr" id="je"></div>
  </div>
</div>

<div id="cs">
  <header class="hdr">
    <div class="hl"><span>👥</span><span class="htitle">AnonimChat</span></div>
    <div class="opill"><div class="odot"></div><span id="oc">0</span>&nbsp;online</div>
    <div class="nbadge" id="nb">—</div>
  </header>
  <div id="msgs">
    <div class="empty" id="emp">
      <span class="ei">💬</span>
      <p>Hali xabar yo'q.<br/>Birinchi bo'ling!</p>
    </div>
  </div>
  <div class="ia">
    <div class="ir">
      <textarea id="mi" placeholder="Xabar yozing..." rows="1"></textarea>
      <button class="sbtn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<script>
// ⚠️ BU QATORNI O'ZGARTIRING — o'z URL'ingizni yozing
const API = 'https://hackfollow111.pythonanywhere.com';

let me = '', offset = 0;

// === CANVAS ===
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H, pts = [];
const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
resize(); addEventListener('resize', resize);
class Pt {
  constructor() { this.r(); }
  r() { this.x=Math.random()*W; this.y=Math.random()*H; this.vx=(Math.random()-.5)*.4; this.vy=(Math.random()-.5)*.4; this.s=Math.random()*1.4+.4; this.c=['rgba(108,99,255,','rgba(255,107,157,','rgba(0,229,255,'][~~(Math.random()*3)]; this.a=Math.random()*.4+.1; }
  u() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>W||this.y<0||this.y>H) this.r(); }
  d() { cx.beginPath(); cx.arc(this.x,this.y,this.s,0,Math.PI*2); cx.fillStyle=this.c+this.a+')'; cx.fill(); }
}
for(let i=0;i<65;i++) pts.push(new Pt());
(function loop(){
  cx.clearRect(0,0,W,H);
  const g=cx.createRadialGradient(W*.3,H*.3,0,W*.3,H*.3,W*.6);
  g.addColorStop(0,'rgba(108,99,255,0.05)'); g.addColorStop(1,'transparent');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
  pts.forEach(p=>{p.u();p.d()});
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<85){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle=`rgba(108,99,255,${.05*(1-d/85)})`;cx.lineWidth=.5;cx.stroke();}
  }
  requestAnimationFrame(loop);
})();

// === UTILS ===
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const post = (url, body) => fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());

// === JOIN ===
async function join() {
  const val = document.getElementById('ni').value.trim();
  const err = document.getElementById('je');
  err.textContent = '';
  if(val.length < 4) return showErr("Ism kamida 4 ta belgi bo'lishi kerak!");
  if(val.length > 20) return showErr("Ism 20 ta harfdan oshmasin!");
  if(!/^[a-zA-Z0-9_\-]+$/.test(val)) return showErr("Faqat harf, raqam, _ va - ishlatiladi!");
  try {
    const d = await post('/join', {username: val});
    if(!d.ok) return showErr(d.error);
    me = val;
    document.getElementById('nb').textContent = val;
    document.getElementById('js').classList.add('hide');
    setTimeout(()=>{ document.getElementById('cs').classList.add('show'); document.getElementById('mi').focus(); }, 400);
    startPoll();
    addEventListener('beforeunload', ()=>{ navigator.sendBeacon(API+'/leave', JSON.stringify({username:me})); });
  } catch(e) { showErr("Server bilan bog'lanib bo'lmadi!"); }
}

function showErr(msg) {
  const el = document.getElementById('je');
  el.textContent = msg; el.style.animation = 'none';
  requestAnimationFrame(()=>{ el.style.animation = 'shk .4s ease'; });
}

// === POLLING ===
function startPoll() {
  setInterval(async()=>{
    try {
      const r = await fetch(API+'/poll?since='+offset);
      const d = await r.json();
      document.getElementById('oc').textContent = d.online.length;
      d.messages.forEach(m => addMsg(m));
      offset = d.total;
      if(me) post('/ping',{username:me});
    } catch(e) {}
  }, 2000);
}

function addMsg(m) {
  const box = document.getElementById('msgs');
  const emp = document.getElementById('emp');
  if(emp) emp.remove();
  if(m.type === 'system') {
    const el = document.createElement('div');
    el.className = 'smsg';
    el.innerHTML = `<span>${esc(m.text)}</span>`;
    box.appendChild(el);
  } else {
    const self = m.username === me;
    const el = document.createElement('div');
    el.className = 'mw '+(self?'self':'other');
    el.innerHTML = `<div class="mm"><span class="un">${self?'Sen':esc(m.username)}</span><span>${m.time}</span></div><div class="mb">${esc(m.text)}</div>`;
    box.appendChild(el);
  }
  box.scrollTop = box.scrollHeight;
}

// === SEND ===
async function send() {
  const inp = document.getElementById('mi');
  const txt = inp.value.trim();
  if(!txt || !me) return;
  inp.value = ''; inp.style.height = 'auto';
  try { await post('/send',{username:me,text:txt}); } catch(e) {}
}

document.getElementById('mi').addEventListener('input', function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,96)+'px';
});
document.getElementById('mi').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
document.getElementById('ni').addEventListener('keydown', e=>{
  if(e.key==='Enter') join();
});
</script>
</body>
</html>
