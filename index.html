<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AnonimChat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05060a;--s1:#0d0f18;--s2:#13162a;--s3:#1a1d35;
  --a1:#6c63ff;--a2:#ff6b9d;--a3:#00e5ff;--a4:#43e97b;
  --tx:#e8eaf0;--td:#6b7280;--br:rgba(108,99,255,0.15);--glow:rgba(108,99,255,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;overflow:hidden}
#cv{position:fixed;inset:0;z-index:0;pointer-events:none}
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") 0/200px}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;
  transition:opacity .45s,transform .45s}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(1.03) translateY(-14px)}

/* ── CARD ── */
.card{position:relative;background:var(--s1);border:1px solid var(--br);border-radius:22px;
  padding:42px 34px;width:min(410px,93vw);box-shadow:0 0 60px var(--glow);
  animation:cIn .7s cubic-bezier(.16,1,.3,1) both}
@keyframes cIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:-1px;left:14%;right:14%;height:2px;
  background:linear-gradient(90deg,transparent,var(--a1),var(--a2),transparent);animation:sh 3s ease infinite}
@keyframes sh{0%,100%{opacity:.4}50%{opacity:1}}
.logo{font-size:38px;display:block;text-align:center;animation:fl 3s ease-in-out infinite;margin-bottom:5px}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ctitle{font-size:1.65rem;font-weight:800;text-align:center;
  background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px}
.csub{font-size:.75rem;color:var(--td);font-family:'Space Mono',monospace;text-align:center;
  margin-bottom:26px;letter-spacing:.04em}
.tabs{display:flex;gap:6px;margin-bottom:20px;background:var(--bg);border-radius:11px;padding:4px}
.tab{flex:1;padding:9px;border:none;background:none;color:var(--td);font-family:'Syne',sans-serif;
  font-size:.88rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s}
.tab.active{background:var(--s2);color:var(--tx);box-shadow:0 0 10px var(--glow)}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--br);border-radius:11px;
  padding:12px 15px;font-size:.92rem;font-family:'Space Mono',monospace;color:var(--tx);
  outline:none;margin-bottom:10px;transition:border-color .3s,box-shadow .3s}
.inp:focus{border-color:var(--a1);box-shadow:0 0 0 3px var(--glow)}
.inp::placeholder{color:var(--td)}
.btn{width:100%;border:none;border-radius:11px;padding:13px;font-size:.92rem;font-weight:700;
  color:#fff;cursor:pointer;font-family:'Syne',sans-serif;transition:transform .2s,box-shadow .2s;
  letter-spacing:.03em;margin-top:2px}
.btn-p{background:linear-gradient(135deg,var(--a1),var(--a2))}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 22px var(--glow)}
.btn-d{background:linear-gradient(135deg,#ff4757,#ff6b9d)}
.btn-s{background:linear-gradient(135deg,var(--a4),#38f9d7);color:#111}
.err{font-size:.73rem;font-family:'Space Mono',monospace;color:var(--a2);
  min-height:15px;margin-top:6px;text-align:center}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

/* ── MAIN APP ── */
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .4s}
#app.show{opacity:1;pointer-events:all}

/* Top bar */
.topbar{height:58px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-bottom:1px solid var(--br);
  background:rgba(13,15,24,.95);backdrop-filter:blur(18px);flex-shrink:0;z-index:20}
.topbar-title{font-size:1rem;font-weight:800;
  background:linear-gradient(90deg,var(--a1),var(--a2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-user{font-size:.72rem;font-family:'Space Mono',monospace;color:var(--a1);
  background:rgba(108,99,255,.1);border:1px solid var(--br);border-radius:999px;padding:3px 11px}
.topbar-logout{background:none;border:1px solid var(--br);border-radius:8px;
  padding:5px 10px;color:var(--td);font-size:.7rem;font-family:'Space Mono',monospace;
  cursor:pointer;transition:all .2s}
.topbar-logout:hover{border-color:var(--a2);color:var(--a2)}

/* Body: sidebar + chat */
.app-body{flex:1;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--br);
  background:rgba(13,15,24,.8);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:600px){
  .sidebar{position:fixed;left:0;top:58px;bottom:0;z-index:30;width:240px;
    transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .chat-area{width:100%!important}
}
.sidebar-head{padding:14px 14px 10px;border-bottom:1px solid var(--br);flex-shrink:0}
.sidebar-head h3{font-size:.65rem;font-family:'Space Mono',monospace;
  color:var(--td);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.new-group-btn{width:100%;background:linear-gradient(135deg,var(--a1),var(--a2));
  border:none;border-radius:10px;padding:9px;font-size:.82rem;font-weight:700;
  color:#fff;cursor:pointer;font-family:'Syne',sans-serif;transition:transform .2s}
.new-group-btn:hover{transform:scale(1.02)}
.groups-list{flex:1;overflow-y:auto;padding:8px}
.groups-list::-webkit-scrollbar{width:3px}
.groups-list::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
.group-item{padding:10px 12px;border-radius:12px;cursor:pointer;margin-bottom:5px;
  border:1px solid transparent;transition:all .2s;animation:fadeU .3s ease both}
@keyframes fadeU{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.group-item:hover{background:var(--s2);border-color:var(--br)}
.group-item.active{background:var(--s3);border-color:rgba(108,99,255,.3);
  box-shadow:0 0 12px rgba(108,99,255,.1)}
.gi-name{font-size:.88rem;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.gi-lock{font-size:.65rem}
.gi-meta{font-size:.65rem;font-family:'Space Mono',monospace;color:var(--td)}
.gi-badge{font-size:.6rem;padding:2px 7px;border-radius:999px;font-weight:700}
.badge-pub{background:rgba(67,233,123,.12);color:var(--a4);border:1px solid rgba(67,233,123,.2)}
.badge-prv{background:rgba(255,107,157,.1);color:var(--a2);border:1px solid rgba(255,107,157,.2)}
.badge-you{background:rgba(108,99,255,.15);color:var(--a1);border:1px solid rgba(108,99,255,.25)}

/* Chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-topbar{height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;border-bottom:1px solid var(--br);background:rgba(13,15,24,.9);flex-shrink:0}
.chat-topbar-left{display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;color:var(--a1);font-size:1.1rem;cursor:pointer;
  padding:4px 6px;border-radius:8px;transition:background .2s;display:none}
@media(max-width:600px){.back-btn{display:block}}
.chat-gname{font-size:.95rem;font-weight:700}
.chat-members{font-size:.65rem;font-family:'Space Mono',monospace;color:var(--td)}
.menu-btn{background:none;border:none;color:var(--tx);font-size:1.2rem;cursor:pointer;
  padding:4px 8px;border-radius:8px;transition:background .2s;position:relative}
.menu-btn:hover{background:var(--s2)}
.dropdown{position:absolute;top:36px;right:0;background:var(--s2);border:1px solid var(--br);
  border-radius:12px;min-width:160px;box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:100;
  overflow:hidden;animation:ddIn .2s ease both}
@keyframes ddIn{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:none}}
.dd-item{padding:11px 16px;font-size:.84rem;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;gap:8px}
.dd-item:hover{background:var(--s3)}
.dd-item.danger{color:var(--a2)}
.no-group{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;color:var(--td)}
.no-group .ei{font-size:2.5rem;animation:fl 3s ease-in-out infinite}
.no-group p{font-size:.78rem;font-family:'Space Mono',monospace;text-align:center;max-width:200px;line-height:1.6}
.msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:7px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
.smsg{text-align:center;font-size:.67rem;font-family:'Space Mono',monospace;color:var(--td)}
.smsg span{background:var(--s2);border:1px solid var(--br);border-radius:999px;
  padding:3px 12px;display:inline-block}
.mw{display:flex;flex-direction:column;max-width:74%;width:fit-content;animation:fadeU .3s ease both}
.mw.self{align-self:flex-end;align-items:flex-end}
.mw.other{align-self:flex-start;align-items:flex-start}
.mm{font-size:.63rem;font-family:'Space Mono',monospace;color:var(--td);margin-bottom:3px;display:flex;gap:5px}
.mm .un{color:var(--a2)}
.mw.self .mm .un{color:var(--a1)}
.mb{padding:9px 13px;border-radius:14px;font-size:.9rem;line-height:1.5;word-break:break-word}
.mw.other .mb{background:#0f1220;border:1px solid var(--br);border-bottom-left-radius:4px}
.mw.self .mb{background:#1a1535;border:1px solid rgba(108,99,255,.22);border-bottom-right-radius:4px}
.join-bar{padding:12px 14px;border-top:1px solid var(--br);
  background:rgba(13,15,24,.95);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.join-bar p{font-size:.78rem;font-family:'Space Mono',monospace;color:var(--td)}
.join-bar button{background:linear-gradient(135deg,var(--a4),#38f9d7);border:none;
  border-radius:10px;padding:9px 18px;font-size:.82rem;font-weight:700;color:#111;
  cursor:pointer;font-family:'Syne',sans-serif;transition:transform .2s}
.join-bar button:hover{transform:scale(1.04)}
.msg-input-area{padding:10px 12px 14px;border-top:1px solid var(--br);
  background:rgba(13,15,24,.96);flex-shrink:0}
.msg-row{display:flex;gap:8px;align-items:flex-end}
#mi{flex:1;background:var(--s2);border:1.5px solid var(--br);border-radius:12px;
  padding:10px 14px;font-size:.9rem;font-family:'Syne',sans-serif;color:var(--tx);
  outline:none;resize:none;max-height:90px;min-height:42px;
  transition:border-color .3s,box-shadow .3s;line-height:1.5}
#mi:focus{border-color:var(--a1);box-shadow:0 0 0 3px var(--glow)}
#mi::placeholder{color:var(--td)}
.sbtn{width:42px;height:42px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--a1),var(--a2));border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  transition:transform .2s,box-shadow .2s}
.sbtn:hover{transform:scale(1.08);box-shadow:0 4px 16px var(--glow)}
.sbtn:active{transform:scale(.93)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--br);border-radius:20px;
  padding:32px 28px;width:min(360px,92vw);box-shadow:0 0 50px var(--glow);
  animation:cIn .5s cubic-bezier(.16,1,.3,1) both}
.modal h3{font-size:1.1rem;font-weight:800;margin-bottom:20px;
  background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.type-btns{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--br);
  background:none;color:var(--td);font-family:'Syne',sans-serif;font-weight:700;
  font-size:.85rem;cursor:pointer;transition:all .2s}
.type-btn.sel-pub{border-color:var(--a4);color:var(--a4);background:rgba(67,233,123,.08)}
.type-btn.sel-prv{border-color:var(--a2);color:var(--a2);background:rgba(255,107,157,.08)}
.modal-btns{display:flex;gap:8px;margin-top:6px}
.modal-btns .btn{margin-top:0}

/* JOIN MODAL */
.join-pw-area{margin-top:10px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="noise"></div>

<!-- AUTH SCREEN -->
<div class="screen" id="auth-screen">
  <div class="card">
    <span class="logo">💬</span>
    <h1 class="ctitle">AnonimChat</h1>
    <p class="csub">// xavfsiz, anonim guruh chati</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Kirish</button>
      <button class="tab" onclick="switchTab('register')">Ro'yxat</button>
    </div>
    <div id="auth-form">
      <input class="inp" id="auth-name" type="text" placeholder="Foydalanuvchi nomi" maxlength="20" autocomplete="off" spellcheck="false"/>
      <input class="inp" id="auth-pw" type="password" placeholder="Parol" maxlength="40"/>
      <button class="btn btn-p" id="auth-btn" onclick="doAuth()">Kirish →</button>
    </div>
    <div class="err" id="auth-err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar-title">💬 AnonimChat</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="topbar-user" id="top-user">—</span>
      <button class="topbar-logout" onclick="doLogout()">Chiqish</button>
    </div>
  </div>

  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h3>Guruhlar</h3>
        <button class="new-group-btn" onclick="openCreateModal()">+ Yangi guruh</button>
      </div>
      <div class="groups-list" id="groups-list"></div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
      <!-- No group selected -->
      <div class="no-group" id="no-group">
        <span class="ei">👈</span>
        <p>Guruh tanlang yoki yangi guruh oching</p>
      </div>

      <!-- Group chat -->
      <div id="group-chat" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-topbar">
          <div class="chat-topbar-left">
            <button class="back-btn" onclick="goBack()">⬅</button>
            <div>
              <div class="chat-gname" id="chat-gname">—</div>
              <div class="chat-members" id="chat-members">0 azо</div>
            </div>
          </div>
          <div style="position:relative">
            <button class="menu-btn" id="menu-btn" onclick="toggleMenu(event)">⋮</button>
            <div class="dropdown hidden" id="dropdown">
              <div class="dd-item" onclick="leaveGroup()">🚪 Guruhni tark etish</div>
              <div class="dd-item danger" id="dd-delete" onclick="deleteGroup()" style="display:none">🗑 Guruhni o'chirish</div>
            </div>
          </div>
        </div>

        <div class="msgs" id="msgs"></div>

        <!-- Join bar (for non-members) -->
        <div class="join-bar hidden" id="join-bar">
          <p>Siz bu guruh azosi emassiz</p>
          <button onclick="openJoinModal()">Qo'shilish</button>
        </div>

        <!-- Message input (for members) -->
        <div class="msg-input-area" id="msg-input-area">
          <div class="msg-row">
            <textarea id="mi" placeholder="Xabar yozing..." rows="1"></textarea>
            <button class="sbtn" onclick="sendMsg()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CREATE GROUP MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h3>➕ Yangi Guruh</h3>
    <input class="inp" id="new-gname" placeholder="Guruh nomi" maxlength="30" autocomplete="off"/>
    <div class="type-btns">
      <button class="type-btn sel-pub" id="btn-pub" onclick="selectType('public')">🌐 Ommaviy</button>
      <button class="type-btn" id="btn-prv" onclick="selectType('private')">🔒 Maxfiy</button>
    </div>
    <div id="prv-pw-area" style="display:none">
      <input class="inp" id="new-gpw" type="password" placeholder="Guruh paroli (kamida 4 belgi)" maxlength="40"/>
    </div>
    <div class="err" id="create-err"></div>
    <div class="modal-btns">
      <button class="btn btn-p" style="flex:1" onclick="createGroup()">Yaratish</button>
      <button class="btn" style="flex:1;background:var(--s2)" onclick="closeModal('create-modal')">Bekor</button>
    </div>
  </div>
</div>

<!-- JOIN GROUP MODAL -->
<div class="modal-overlay" id="join-modal">
  <div class="modal">
    <h3>🔑 Guruhga Qo'shilish</h3>
    <p style="font-size:.8rem;color:var(--td);font-family:'Space Mono',monospace;margin-bottom:14px" id="join-gname-label">—</p>
    <div class="join-pw-area" id="join-pw-area" style="display:none">
      <input class="inp" id="join-gpw" type="password" placeholder="Guruh paroli" maxlength="40"/>
    </div>
    <div class="err" id="join-err"></div>
    <div class="modal-btns">
      <button class="btn btn-s" style="flex:1" onclick="joinGroup()">Qo'shilish</button>
      <button class="btn" style="flex:1;background:var(--s2)" onclick="closeModal('join-modal')">Bekor</button>
    </div>
  </div>
</div>

<script>
const API = 'https://hackfollow111.pythonanywhere.com';
let me = '', curGroup = '', msgOffset = 0, pollTimer = null, newGType = 'public';

// ── CANVAS ──────────────────────────────────────────
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H, pts = [];
const rsz = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
rsz(); addEventListener('resize', rsz);
class Pt {
  constructor(){ this.r(); }
  r(){ this.x=Math.random()*W; this.y=Math.random()*H; this.vx=(Math.random()-.5)*.35; this.vy=(Math.random()-.5)*.35;
    this.s=Math.random()*1.3+.4; this.c=['rgba(108,99,255,','rgba(255,107,157,','rgba(0,229,255,'][~~(Math.random()*3)]; this.a=Math.random()*.35+.08; }
  u(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>W||this.y<0||this.y>H) this.r(); }
  d(){ cx.beginPath(); cx.arc(this.x,this.y,this.s,0,Math.PI*2); cx.fillStyle=this.c+this.a+')'; cx.fill(); }
}
for(let i=0;i<60;i++) pts.push(new Pt());
(function loop(){
  cx.clearRect(0,0,W,H);
  const g=cx.createRadialGradient(W*.3,H*.3,0,W*.3,H*.3,W*.55);
  g.addColorStop(0,'rgba(108,99,255,0.04)'); g.addColorStop(1,'transparent');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
  pts.forEach(p=>{ p.u(); p.d(); });
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<80){ cx.beginPath(); cx.moveTo(pts[i].x,pts[i].y); cx.lineTo(pts[j].x,pts[j].y);
      cx.strokeStyle=`rgba(108,99,255,${.04*(1-d/80)})`; cx.lineWidth=.5; cx.stroke(); }
  }
  requestAnimationFrame(loop);
})();

// ── UTILS ────────────────────────────────────────────
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const post = (url, body) => fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
const get = url => fetch(API+url).then(r=>r.json());

// ── AUTH ─────────────────────────────────────────────
let authMode = 'login';
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(mode==='login'&&i===0)||(mode==='register'&&i===1)));
  document.getElementById('auth-btn').textContent = mode==='login' ? 'Kirish →' : "Ro'yxatdan o'tish →";
  document.getElementById('auth-err').textContent = '';
}

async function doAuth() {
  const n = document.getElementById('auth-name').value.trim();
  const pw = document.getElementById('auth-pw').value.trim();
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  try {
    const url = authMode==='login' ? '/login' : '/register';
    const d = await post(url, {username:n, password:pw});
    if(!d.ok){ errEl.textContent = d.error; errEl.style.animation='none'; requestAnimationFrame(()=>errEl.style.animation='shk .4s ease'); return; }
    me = d.username;
    localStorage.setItem('ac_user', n);
    localStorage.setItem('ac_pw', pw);
    startApp();
  } catch(e){ errEl.textContent = "Server bilan bog'lanib bo'lmadi!"; }
}

async function doLogout() {
  await post('/logout', {username:me});
  localStorage.removeItem('ac_user');
  localStorage.removeItem('ac_pw');
  me = ''; curGroup = '';
  clearInterval(pollTimer);
  document.getElementById('app').classList.remove('show');
  document.getElementById('auth-screen').classList.remove('hidden');
}

// Auto-login
window.addEventListener('DOMContentLoaded', async () => {
  const u = localStorage.getItem('ac_user'), pw = localStorage.getItem('ac_pw');
  if(u && pw) {
    try {
      const d = await post('/login', {username:u, password:pw});
      if(d.ok){ me = d.username; startApp(); return; }
    } catch(e){}
  }
  document.getElementById('auth-screen').classList.remove('hidden');
});

// ── APP START ─────────────────────────────────────────
function startApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  document.getElementById('top-user').textContent = me;
  loadGroups();
  clearInterval(pollTimer);
  pollTimer = setInterval(tick, 2500);
}

async function tick() {
  await loadGroups();
  if(curGroup) await pollMsgs();
}

// ── GROUPS ───────────────────────────────────────────
let groupsData = [];
async function loadGroups() {
  try {
    const d = await get('/groups');
    if(!d.ok) return;
    groupsData = d.groups;
    renderGroups();
  } catch(e){}
}

function renderGroups() {
  const el = document.getElementById('groups-list');
  el.innerHTML = '';
  if(!groupsData.length){
    el.innerHTML = '<div style="text-align:center;padding:20px;font-size:.72rem;font-family:Space Mono,monospace;color:var(--td)">Hali guruh yo\'q</div>';
    return;
  }
  groupsData.forEach(g => {
    const isMine = g.owner === me;
    const isMember = g.members.includes(me);
    const isActive = g.name === curGroup;
    const div = document.createElement('div');
    div.className = 'group-item' + (isActive?' active':'');
    div.innerHTML = `
      <div class="gi-name">
        ${esc(g.name)}
        ${g.type==='private'?'<span class="gi-lock">🔒</span>':''}
        ${isMine?'<span class="gi-badge badge-you">Egasi</span>':isMember?'<span class="gi-badge badge-pub">Azо</span>':''}
      </div>
      <div class="gi-meta">
        <span class="gi-badge ${g.type==='public'?'badge-pub':'badge-prv'}">${g.type==='public'?'Ommaviy':'Maxfiy'}</span>
        &nbsp;${g.count} azо
      </div>`;
    div.onclick = () => openGroup(g.name);
    el.appendChild(div);
  });
}

// ── OPEN GROUP ───────────────────────────────────────
function openGroup(gname) {
  curGroup = gname;
  msgOffset = 0;
  document.getElementById('no-group').style.display = 'none';
  const gc = document.getElementById('group-chat');
  gc.style.display = 'flex';
  document.getElementById('chat-gname').textContent = gname;
  document.getElementById('msgs').innerHTML = '';
  renderGroups();

  const g = groupsData.find(x=>x.name===gname);
  if(!g) return;
  const isMember = g.members.includes(me);
  const isOwner = g.owner === me;

  document.getElementById('chat-members').textContent = `${g.count} azо`;
  document.getElementById('join-bar').classList.toggle('hidden', isMember);
  document.getElementById('msg-input-area').style.display = isMember ? '' : 'none';
  document.getElementById('dd-delete').style.display = isOwner ? '' : 'none';

  // mobile sidebar close
  document.getElementById('sidebar').classList.remove('open');
  pollMsgs();
}

async function pollMsgs() {
  if(!curGroup) return;
  try {
    const d = await get(`/poll_group?group=${encodeURIComponent(curGroup)}&since=${msgOffset}`);
    if(!d.ok) return;
    d.messages.forEach(m => addMsg(m));
    msgOffset = d.total;
    document.getElementById('chat-members').textContent = `${d.members.length} azо`;
    const g = groupsData.find(x=>x.name===curGroup);
    if(g){ g.members = d.members; g.count = d.members.length; }
    const isMember = d.members.includes(me);
    document.getElementById('join-bar').classList.toggle('hidden', isMember);
    document.getElementById('msg-input-area').style.display = isMember ? '' : 'none';
  } catch(e){}
}

function addMsg(m) {
  const box = document.getElementById('msgs');
  if(m.type==='system'){
    const el = document.createElement('div');
    el.className = 'smsg'; el.innerHTML = `<span>${esc(m.text)}</span>`;
    box.appendChild(el);
  } else {
    const self = m.username===me;
    const el = document.createElement('div');
    el.className = 'mw '+(self?'self':'other');
    el.innerHTML = `<div class="mm"><span class="un">${self?'Sen':esc(m.username)}</span><span>${m.time}</span></div><div class="mb">${esc(m.text)}</div>`;
    box.appendChild(el);
  }
  box.scrollTop = box.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('mi');
  const txt = inp.value.trim();
  if(!txt||!curGroup) return;
  inp.value = ''; inp.style.height = 'auto';
  try { await post('/send_message',{username:me,group_name:curGroup,text:txt}); await pollMsgs(); } catch(e){}
}

// ── LEAVE / DELETE ───────────────────────────────────
async function leaveGroup() {
  closeDropdown();
  if(!confirm(`"${curGroup}" guruhini tark etasizmi?`)) return;
  await post('/leave_group',{username:me,group_name:curGroup});
  curGroup=''; msgOffset=0;
  document.getElementById('no-group').style.display='';
  document.getElementById('group-chat').style.display='none';
  await loadGroups();
}

async function deleteGroup() {
  closeDropdown();
  if(!confirm(`"${curGroup}" guruhini o'chirasizmi? Barcha xabarlar o'chadi!`)) return;
  await post('/delete_group',{username:me,group_name:curGroup});
  curGroup=''; msgOffset=0;
  document.getElementById('no-group').style.display='';
  document.getElementById('group-chat').style.display='none';
  await loadGroups();
}

// ── CREATE GROUP MODAL ───────────────────────────────
function openCreateModal() {
  document.getElementById('new-gname').value='';
  document.getElementById('new-gpw').value='';
  document.getElementById('create-err').textContent='';
  newGType='public';
  document.getElementById('btn-pub').className='type-btn sel-pub';
  document.getElementById('btn-prv').className='type-btn';
  document.getElementById('prv-pw-area').style.display='none';
  document.getElementById('create-modal').classList.add('show');
}

function selectType(t) {
  newGType=t;
  document.getElementById('btn-pub').className='type-btn'+(t==='public'?' sel-pub':'');
  document.getElementById('btn-prv').className='type-btn'+(t==='private'?' sel-prv':'');
  document.getElementById('prv-pw-area').style.display=t==='private'?'':'none';
}

async function createGroup() {
  const gn=document.getElementById('new-gname').value.trim();
  const gpw=document.getElementById('new-gpw').value.trim();
  const errEl=document.getElementById('create-err');
  errEl.textContent='';
  try {
    const d=await post('/create_group',{username:me,group_name:gn,type:newGType,password:gpw});
    if(!d.ok){errEl.textContent=d.error;return;}
    closeModal('create-modal');
    await loadGroups();
    openGroup(gn);
  } catch(e){errEl.textContent="Xatolik!";}
}

// ── JOIN GROUP MODAL ─────────────────────────────────
function openJoinModal() {
  const g=groupsData.find(x=>x.name===curGroup);
  if(!g) return;
  document.getElementById('join-gname-label').textContent=`Guruh: ${curGroup}`;
  document.getElementById('join-gpw').value='';
  document.getElementById('join-err').textContent='';
  document.getElementById('join-pw-area').style.display=g.type==='private'?'':'none';
  document.getElementById('join-modal').classList.add('show');
}

async function joinGroup() {
  const gpw=document.getElementById('join-gpw').value.trim();
  const errEl=document.getElementById('join-err');
  errEl.textContent='';
  try {
    const d=await post('/join_group',{username:me,group_name:curGroup,password:gpw});
    if(!d.ok){errEl.textContent=d.error;return;}
    closeModal('join-modal');
    await loadGroups();
    openGroup(curGroup);
  } catch(e){errEl.textContent="Xatolik!";}
}

// ── DROPDOWN MENU ────────────────────────────────────
function toggleMenu(e) {
  e.stopPropagation();
  const dd=document.getElementById('dropdown');
  dd.classList.toggle('hidden');
}
function closeDropdown(){document.getElementById('dropdown').classList.add('hidden');}
document.addEventListener('click',()=>closeDropdown());

// ── HELPERS ──────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.remove('show');}
function goBack(){
  curGroup=''; msgOffset=0;
  document.getElementById('no-group').style.display='';
  document.getElementById('group-chat').style.display='none';
  document.getElementById('sidebar').classList.add('open');
  renderGroups();
}

document.getElementById('mi').addEventListener('input',function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,90)+'px';
});
document.getElementById('mi').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById('auth-pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doAuth(); });
document.getElementById('auth-name').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('auth-pw').focus(); });
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',function(e){if(e.target===this) this.classList.remove('show');}));
</script>
</body>
